name: devpath_mobile
description: "DevPath AI 모바일 앱(슬라이스 #10). dp_core 공유 재사용 · StatefulShellRoute · drift 오프라인 캐시 · OAuth 딥링크 · secure_storage."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # workspace 멤버(path 결선, resolution: workspace) — web과 동일 공유 계층
  dp_core:
    path: ../../packages/dp_core
  dp_design:
    path: ../../packages/dp_design

  # 상태/라우팅 — web과 버전 정렬(단일 워크스페이스 해석)
  flutter_riverpod: ^3.3.0
  go_router: ^14.6.0

  # 모바일 전용 (Build A)
  flutter_secure_storage: ^9.2.2   # SecureStorageTokenStore — 하한 가이드, 해석 결과로 확정
  app_links: ^6.3.0                # OAuth 콜백 딥링크(devpath://callback)
  url_launcher: ^6.3.0             # OAuth 인가 URL 외부 브라우저 실행

  # 오프라인 캐시 (Build B)
  drift: ^2.20.0                   # 오프라인 읽기 캐시
  sqlite3_flutter_libs: ^0.5.24    # 네이티브 sqlite3 번들
  path_provider: ^2.1.4            # DB 파일 경로
  path: ^1.9.0
  connectivity_plus: ^6.1.0        # 재연결 동기화 감지

  # FCM 푸시 (Build D) — 실 FcmPushService 골격(PushService 교체 경계).
  # 실 동작은 Firebase 프로젝트 + google-services.json/APNs + Firebase.initializeApp 후속.
  firebase_core: ^4.11.0           # Firebase 초기화(후속 결선)
  firebase_messaging: ^16.4.1      # getToken·onMessage(포그라운드) → PushMessage

  crypto: ^3.0.6                   # PKCE code_challenge = SHA256(verifier) (하드닝 트랙 A)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  dio: ^5.0.0        # 테스트에서 HttpClientAdapter 직접 구현(dp_core 전이 의존 명시화)
  drift_dev: ^2.20.0 # drift 코드젠
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
