name: devpath_frontend
publish_to: none
environment:
  sdk: ^3.12.1

# Dart pub workspaces — 모든 패키지/앱을 단일 해석으로 묶는다.
# landing(Jaspr)은 의존성 충돌 위험으로 P7에서 별도 결정(여기 미포함).
workspace:
  - packages/dp_core
  - packages/dp_design
  - apps/web
  - apps/admin
  - apps/mobile

dev_dependencies:
  melos: ^7.0.0

# melos 7.x: 설정이 pubspec.yaml의 melos: 키로 통합됨(과거 melos.yaml 대체)
# dp_core는 순수 Dart(dart analyze/test), 나머지는 Flutter(flutter analyze/test) → --flutter/--no-flutter로 분기.
melos:
  scripts:
    analyze:
      description: 전 패키지 정적 분석(Flutter=flutter analyze, 순수 Dart=dart analyze)
      run: melos exec --flutter -- flutter analyze && melos exec --no-flutter -- dart analyze
    test:
      description: test/ 있는 패키지 테스트(Flutter=flutter test, 순수 Dart=dart test). 골든 제외(P3-A·T-GOLDEN-CI-EXCLUDE).
      run: melos exec --flutter --dir-exists="test" -- flutter test --exclude-tags golden && melos exec --no-flutter --dir-exists="test" -- dart test
    format:
      description: 포맷 검사(CI용)
      run: dart format --set-exit-if-changed .
    fix:
      description: 포맷 적용
      run: dart format .
